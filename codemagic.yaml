workflows:
  ios-free-build:
    name: iOS Free Accounts Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get Flutter dependencies
        script: |
          set -e
          flutter pub get

      - name: Force iOS deployment target to 14.0
        script: |
          set -e

          if [ ! -f ios/Podfile ]; then
            echo "ios/Podfile not found"
            exit 1
          fi

          ruby - <<'RUBY'
          path = "ios/Podfile"
          text = File.read(path)

          if text.match?(/^platform :ios,/)
            text.gsub!(/^platform :ios, .*/, "platform :ios, '14.0'")
          else
            text = "platform :ios, '14.0'\n" + text
          end

          File.write(path, text)
          puts "Updated Podfile:"
          puts File.read(path)
          RUBY

      - name: Install CocoaPods
        script: |
          set -e
          cd ios
          pod install --repo-update
          cd ..

      - name: Build unsigned iOS IPA
        script: |
          set -e
          flutter build ios --release --no-codesign

          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/

          cd build/ios/iphoneos
          zip -r unsigned_app.ipa Payload

    artifacts:
      - build/ios/iphoneos/unsigned_app.ipa
